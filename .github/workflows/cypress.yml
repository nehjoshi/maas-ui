name: Cypress
on:
  push:
    branches:
      - main
      - "3.*"
      - "*cypress*"
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  cypress:
    name: Cypress
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        groups: ["no-users", "with-users"]
    env:
      MAAS_URL: http://localhost:5240
      MAAS_UI_URL: http://localhost:8400
    steps:
      - uses: actions/checkout@main
      - name: Get branch name
        uses: nelonoel/branch-name@v1.0.1
      - name: Setup MAAS
        uses: canonical/setup-maas@main
        with:
          maas-url: ${{ env.MAAS_URL }}/MAAS
      - name: Install Keycloak for SSO tests
        run: |
          CONTAINER_NAME=keycloak-test
          CONTAINER_PORT=8080
          docker run -d --name keycloak-test \
          -p 8080:8080 \
          -e KC_BOOTSTRAP_ADMIN_USERNAME=admin \
          -e KC_BOOTSTRAP_ADMIN_PASSWORD=admin \
          quay.io/keycloak/keycloak:26.5.5 start-dev
          echo "Waiting for Keycloak to start..."
          sleep 30 

          # Log in as admin
          docker exec -i $CONTAINER_NAME /bin/bash -c "\
            /opt/keycloak/bin/kcadm.sh config credentials \
              --server http://localhost:8080 \
              --realm master \
              --user admin \
              --password admin
          "

          # Create test realm and client
          docker exec -i $CONTAINER_NAME /bin/bash -c "\
            /opt/keycloak/bin/kcadm.sh create realms -s realm=test-realm -s enabled=true
          "
          docker exec -i $CONTAINER_NAME /bin/bash -c "\
            /opt/keycloak/bin/kcadm.sh create clients \
              -r test-realm \
              -s clientId=maas-client \
              -s enabled=true \
              -s publicClient=false \
              -s 'standardFlowEnabled=true' \
              -s \"redirectUris=[\\\"${MAAS_URL}/r/login/oidc/callback\\\"]\"
          "

          # Get client secret
          export KC_CLIENT_SECRET=$(docker exec $CONTAINER_NAME /bin/bash -c "\
            CLIENT_ID=\$(/opt/keycloak/bin/kcadm.sh get clients -r test-realm -q clientId=maas-client --fields id --format csv | tail -n1 | tr -d '\"'); \
            /opt/keycloak/bin/kcadm.sh get clients/\$CLIENT_ID/client-secret -r test-realm | grep value | cut -d'\"' -f4
          ")

          # Create test user
          docker exec -i $CONTAINER_NAME /bin/bash -c "\
            /opt/keycloak/bin/kcadm.sh create users -r test-realm \
              -s username=johndoe \
              -s email=john.doe@example.com \
              -s firstName=john \
              -s lastName=doe \
              -s enabled=true
          "
          docker exec -i $CONTAINER_NAME /bin/bash -c "\
            /opt/keycloak/bin/kcadm.sh set-password -r test-realm \
              --username johndoe \
              --new-password abc123 \
              --temporary=false
          "

          # Register Keycloak as OIDC provider in MAAS
          API_KEY=$(sudo maas apikey --username maas --generate)
          sudo maas login maas ${MAAS_URL} $API_KEY
          sudo maas maas oidc-providers create \
            name="Keycloak" \
            client_id="maas-client" \
            client_secret="$KC_CLIENT_SECRET" \
            enabled=True \
            issuer_url="http://localhost:8080/realms/test-realm" \
            token_type="JWT" \
            redirect_uri="${MAAS_URL}/r/login/oidc/callback" \
            scopes="openid profile email offline_access" -k
      - name: Use Node.js from .nvmrc
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
      - name: Install Cypress
        uses: cypress-io/github-action@v4
        with:
          runTests: false
          install-command: yarn install
          build: yarn build
      - name: Create MAAS admin
        if: matrix.groups == 'with-users'
        run: sudo maas createadmin --username=admin --password=test --email=fake@example.org
      - name: Create MAAS non-admin user
        if: matrix.groups == 'with-users'
        run: |
          export API_KEY=`sudo maas apikey --username=admin`
          maas login admin http://localhost:5240/MAAS $API_KEY
          maas admin users create username=user password=test email=fake-user@example.org is_superuser=0
      - name: Wait for MAAS boot resources
        if: matrix.groups == 'with-users'
        shell: bash
        run: while [ $(maas admin boot-resources is-importing | cat) == "true" ]; do sleep 10; done; echo "syncing finished"
      - name: Run Cypress tests
        uses: cypress-io/github-action@v4
        with:
          config: baseUrl=${{env.MAAS_UI_URL}},pageLoadTimeout=100000
          install: false
          start: yarn start
          spec: cypress/e2e/${{ matrix.groups }}/**/*.{spec.ts,feature}
          wait-on: ${{env.MAAS_UI_URL}}/MAAS/r/machines
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: cypress/screenshots
      - name: Collect MAAS logs
        if: failure()
        shell: bash
        run: journalctl -u snap.maas.pebble.service --since="1 hour ago" > cypress/maas_logs.txt
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: maas_logs
          path: cypress/maas_logs.txt
      - name: Create issue on failure
        # Create an issue if the job fails on push to main or 3.* branches
        if: failure() && github.event_name == 'push' && contains(fromJson('["main", "3.*"]'), env.BRANCH_NAME)
        uses: JasonEtco/create-an-issue@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          WORKFLOW: ${{ github.workflow }}
        with:
          filename: .github/ISSUE_TEMPLATE/ci-failure.md
          update_existing: true
